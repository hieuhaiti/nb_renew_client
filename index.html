<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS | NinhBinh Renew </title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Preconnect critical origins (PHẢI đứng trước stylesheet) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300;400;500;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="preconnect" href="https://api.mapbox.com" crossorigin />
  <link rel="preconnect" href="https://events.mapbox.com" crossorigin />

  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="https://api.mapbox.com" />
  <link rel="dns-prefetch" href="https://events.mapbox.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Prefetch Mapbox -->
  <link rel="prefetch" as="script" href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js" />
  <link rel="prefetch" as="style" href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" />
</head>

  <script type="module" src="/src/main.jsx"></script>
